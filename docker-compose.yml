services:
  db:
    image: postgres:16-alpine
    container_name: hwengineering-db
    environment:
      POSTGRES_DB: hwengineering
      POSTGRES_USER: hwengineering
      POSTGRES_PASSWORD: hwengineering
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwengineering -d hwengineering"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hwengineering-backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://hwengineering:hwengineering@db:5432/hwengineering
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hwengineering-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:

